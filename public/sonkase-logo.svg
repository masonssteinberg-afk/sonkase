<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="480" height="140" role="img" aria-label="Sonkase Private Dining">
  <title>Sonkase — Private Dining</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400&amp;family=Cormorant+Garamond:wght@300&amp;display=swap');
    </style>
  </defs>

  <!-- ── MARK: Triple wave chopsticks (90×100 scaled into 100×120 area, centered at x=68) ── -->
  <g transform="translate(18, 10) scale(0.9)">
    <!-- Chopstick left -->
    <line x1="35" y1="12" x2="42" y2="108"
          stroke="#e6dac8" stroke-width="1.6" stroke-linecap="round"/>
    <!-- Chopstick right -->
    <line x1="55" y1="12" x2="48" y2="108"
          stroke="#e6dac8" stroke-width="1.6" stroke-linecap="round"/>
    <!-- Gold pivot dot -->
    <circle cx="45" cy="19" r="3" fill="#b8892a"/>
    <!-- Wave 1 — primary -->
    <path d="M8 48 C18 34, 30 30, 45 38 C60 46, 72 42, 82 30"
          stroke="#b8892a" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Wave 2 — mid -->
    <path d="M8 58 C18 44, 30 40, 45 48 C60 56, 72 52, 82 40"
          stroke="#b8892a" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.5"/>
    <!-- Wave 3 — echo -->
    <path d="M8 68 C18 54, 30 50, 45 58 C60 66, 72 62, 82 50"
          stroke="#b8892a" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.22"/>
  </g>

  <!-- ── VERTICAL RULE ── -->
  <line x1="118" y1="28" x2="118" y2="112"
        stroke="#b8892a" stroke-width="0.7" opacity="0.6"/>

  <!-- ── WORDMARK ── -->
  <!-- "sonkase" — rendered as paths so no font dependency -->
  <!-- Using text with embedded font reference; SVG is self-contained for web use -->
  <text x="138" y="88"
        font-family="'Shippori Mincho', 'Hiragino Mincho Pro', 'Times New Roman', serif"
        font-weight="400"
        font-size="52"
        letter-spacing="11"
        fill="#e6dac8"
        dominant-baseline="auto">sonkase</text>

  <!-- "Private Dining" sub -->
  <text x="140" y="108"
        font-family="'Cormorant Garamond', 'Georgia', serif"
        font-weight="300"
        font-style="normal"
        font-size="11"
        letter-spacing="5.5"
        fill="#b8892a"
        dominant-baseline="auto">PRIVATE DINING</text>

</svg>
